<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Xx16‑ALM — Text/Image System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h2 class="title">Xx16‑ALM — Text ↔ Image</h2>

  <!-- TEXT INPUT -->
  <section class="box">
    <h3>النص</h3>

    <label>أدخل النص هنا أو قم بتحميل ملف لاستخراج النص:</label>
    <textarea id="textBox" placeholder="اكتب النص هنا..."></textarea>

    <label>تحميل ملف TXT / PDF / DOCX:</label>
    <input type="file" id="fileInput">

    <button id="btnExtract">استخراج النص من الملف</button>
  </section>

  <!-- ENCODE -->
  <section class="box">
    <h3>تحويل النص إلى صورة</h3>

    <label>مفتاح المستخدم (اختياري):</label>
    <input type="text" id="userKey" placeholder="مثال: USER-KEY-123">

    <button id="btnEncode">تحويل النص إلى صورة</button>
    <button id="btnSaveImage" class="save">💾 حفظ الصورة</button>

    <p id="statusEncode" class="status">جاهز.</p>

    <canvas id="canvas"></canvas>
  </section>

  <!-- DECODE -->
  <section class="box">
    <h3>استرجاع من صورة</h3>

    <label>اختيار صورة PNG:</label>
    <input type="file" id="imageInput" accept="image/png">

    <button id="btnDecode">استرجاع</button>

    <h4>البيانات المستخرجة:</h4>
    <div id="metaBox" class="metaBox"></div>

    <label>النص المسترجع:</label>
    <textarea id="outputText" readonly></textarea>

    <button id="btnExport">تنزيل الملف الأصلي</button>

    <p id="statusDecode" class="status"></p>
  </section>

  <footer>
    © 2026 — <strong>Developer: Eng. رأفت عمر</strong>
  </footer>

  <script src="script.js"></script>
</body>
</html>
