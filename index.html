<script>

// ================= SETTINGS =================
const B=32, LMAX=12, SIZE=1024, HEADER=32;

// ================= COVER IMAGE =================
let coverImageData = null;

document.getElementById("docInput").insertAdjacentHTML("afterend",
  '<input type="file" id="coverInput" accept="image/*" style="margin-top:10px;">'
);

document.getElementById("coverInput").onchange = async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  const img = new Image();
  const url = URL.createObjectURL(file);

  await new Promise(res=>{
    img.onload = res;
    img.src = url;
  });

  const canvas = document.createElement("canvas");
  canvas.width = SIZE;
  canvas.height = SIZE;
  const ctx = canvas.getContext("2d");

  ctx.drawImage(img,0,0,SIZE,SIZE);
  coverImageData = ctx.getImageData(0,0,SIZE,SIZE);

  URL.revokeObjectURL(url);
};

// ================= CHAR TABLE =================
const indexToChar={
1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",8:"د",9:"ذ",
10:"ر",11:"ز",12:"س",13:"ش",14:"ص",15:"ض",16:"ط",
17:"ظ",18:"ع",19:"غ",20:"ف",21:"ق",22:"ك",23:"ل",
24:"م",25:"ن",26:"ه",27:"و",28:"ي"
};

const charToIndex={};
for (let k in indexToChar) charToIndex[indexToChar[k]] = Number(k);

// ================= CLEAN =================
function cleanText(t){
  return t.replace(/[^\u0621-\u064A ]/g," ").replace(/\s+/g," ").trim();
}

// ================= WORD =================
function wordToCode(w){
  let C=0n;
  for(let i=0;i<w.length;i++){
    C += BigInt(charToIndex[w[i]]||0) * (32n**BigInt(i));
  }
  return C;
}

function codeToWord(C){
  let w="";
  for(let i=0;i<LMAX;i++){
    let d=Number(C%32n);
    C/=32n;
    if(d) w+=indexToChar[d];
  }
  return w;
}

// ================= LSB WRITE =================
function writeBitsLSB(data, bits){
  let bi=0;

  for(let i=0;i<data.length && bi<bits.length;i+=4){
    for(let c=0;c<3;c++){
      if(bi>=bits.length) break;

      data[i+c] = (data[i+c] & 0xFE) | bits[bi++];
    }
  }
}

// ================= LSB READ =================
function readBitsLSB(data, totalBits){
  let bits=[];
  let bi=0;

  for(let i=0;i<data.length && bi<totalBits;i+=4){
    for(let c=0;c<3;c++){
      if(bi>=totalBits) break;
      bits.push(data[i+c] & 1);
      bi++;
    }
  }
  return bits;
}

// ================= BITS UTILS =================
function bytesToBits(bytes){
  let bits=[];
  bytes.forEach(b=>{
    for(let i=0;i<8;i++){
      bits.push((b>>i)&1);
    }
  });
  return bits;
}

function bitsToBytes(bits){
  let bytes=[];
  for(let i=0;i<bits.length;i+=8){
    let b=0;
    for(let j=0;j<8;j++){
      if(bits[i+j]) b |= (1<<j);
    }
    bytes.push(b);
  }
  return bytes;
}

// ================= ENCODE =================
btnEncode.onclick = async ()=>{

  const file = document.getElementById("docInput").files[0];
  if(!file) return alert("اختر ملف");

  let text = await extractText(file);
  text = cleanText(text);

  const key = BigInt(document.getElementById("userKey").value||0);

  const words = text.split(" ");
  const blocks=[];

  words.forEach(w=>{
    for(let i=0;i<w.length;i+=LMAX){
      blocks.push(w.slice(i,i+LMAX));
    }
  });

  let bytes=[];

  // count
  let count=BigInt(blocks.length);
  for(let i=0;i<8;i++){
    bytes.push(Number((count>>BigInt(8*i))&255n));
  }

  // data
  blocks.forEach(b=>{
    let C = wordToCode(b)^key;
    for(let j=0;j<8;j++){
      bytes.push(Number((C>>BigInt(8*j))&255n));
    }
  });

  const bits = bytesToBits(bytes);

  const canvas = document.getElementById("canvas");
  canvas.width = SIZE;
  canvas.height = SIZE;

  const ctx = canvas.getContext("2d");

  let imgData;

  if(coverImageData){
    imgData = new ImageData(
      new Uint8ClampedArray(coverImageData.data),
      SIZE,
      SIZE
    );
  }else{
    imgData = ctx.createImageData(SIZE,SIZE);

    for(let i=0;i<imgData.data.length;i+=4){
      imgData.data[i]=240;
      imgData.data[i+1]=240;
      imgData.data[i+2]=255;
      imgData.data[i+3]=255;
    }
  }

  writeBitsLSB(imgData.data, bits);

  ctx.putImageData(imgData,0,0);

  alert("تم التشفير داخل صورة طبيعية بنجاح ✅");
};

// ================= DECODE =================
btnDecode.onclick = async ()=>{

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const data = ctx.getImageData(0,0,SIZE,SIZE).data;

  const key = BigInt(document.getElementById("userKey").value||0);

  // read first 64 bits (count)
  const countBits = readBitsLSB(data, 64);
  const countBytes = bitsToBytes(countBits);

  let count=0n;
  for(let i=0;i<8;i++){
    count |= BigInt(countBytes[i])<<(8n*BigInt(i));
  }

  const totalBytes = 8 + Number(count)*8;
  const totalBits = totalBytes*8;

  const bits = readBitsLSB(data, totalBits);
  const bytes = bitsToBytes(bits);

  let blocks=[];
  let index=8;

  for(let i=0;i<Number(count);i++){
    let C=0n;
    for(let j=0;j<8;j++){
      C |= BigInt(bytes[index++])<<(8n*BigInt(j));
    }
    blocks.push(codeToWord(C^key));
  }

  outputText.textContent = blocks.join(" ");
};

</script>
