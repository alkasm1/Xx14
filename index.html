<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>ALM‑64bit Xx16 Encoder</title>

    <link rel="stylesheet" href="style.css" />

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.js"></script>

    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>
    <div class="app">

        <h1>ALM‑64bit — Xx16 Encoder/Decoder</h1>

        <section class="panel">
            <h2>🔐 رمز المستخدم (User Key)</h2>
            <input id="userKey" type="text" placeholder="أدخل رمز المستخدم هنا..." />
        </section>

        <section class="panel">
            <h2>📥 إدخال النص أو الملف</h2>

            <label class="label">نص يدوي:</label>
            <textarea id="inputText" placeholder="اكتب النص هنا..."></textarea>

            <div class="row">
                <div>
                    <label class="label">اختيار ملف (TXT / DOCX / PDF):</label>
                    <input type="file" id="fileInput" />
                </div>
                <button id="extractFromFileBtn">استخراج النص</button>
            </div>

            <div class="row">
                <button id="encodeToImageBtn">تحويل النص إلى صورة</button>
            </div>
        </section>

        <section class="panel">
            <h2>🖼️ الصورة الناتجة</h2>
            <canvas id="canvas" width="1024" height="1024"></canvas>

            <div class="row">
                <button id="downloadImageBtn">تحميل الصورة</button>
            </div>
        </section>

        <section class="panel">
            <h2>📤 استرجاع النص من الصورة</h2>

            <div class="row">
                <label class="label">اختيار صورة:</label>
                <input type="file" id="imageInput" accept="image/png,image/jpeg" />
            </div>

            <div class="row">
                <button id="decodeFromImageBtn">استخراج النص</button>
            </div>

            <label class="label">النص المسترجع:</label>
            <textarea id="outputText" readonly></textarea>

            <div class="row">
                <button id="downloadRecoveredTxtBtn">حفظ كنص TXT</button>
            </div>
        </section>

    </div>

    <!-- يجب أن يكون ترتيب السكربتات بهذا الشكل بالضبط -->
    <script src="alm64.js"></script>
    <script src="script.js"></script>

</body>
</html>
