<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>ALM‑Xx16 Word Encoder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>ALM‑Xx16 — تحويل النصوص والكتب إلى صورة</h1>

    <section class="panel">
      <h2>إدخال النص / الملف</h2>

      <label class="label">نص يدوي:</label>
      <textarea id="inputText" placeholder="اكتب النص هنا..."></textarea>

      <div class="row">
        <div>
          <label class="label">اختيار ملف (TXT / DOCX / PDF):</label>
          <input type="file" id="fileInput" />
        </div>
        <button id="extractFromFileBtn">استخراج النص من الملف</button>
      </div>

      <div class="row">
        <button id="encodeToImageBtn">تحويل إلى صورة (ALM‑Xx16)</button>
      </div>
    </section>

    <section class="panel">
      <h2>الصورة الناتجة</h2>
      <canvas id="canvas" width="1024" height="1024"></canvas>
      <div class="row">
        <button id="downloadImageBtn">تحميل الصورة</button>
      </div>
    </section>

    <section class="panel">
      <h2>الاسترجاع من صورة</h2>

      <div class="row">
        <label class="label">اختيار صورة:</label>
        <input type="file" id="imageInput" accept="image/png,image/jpeg" />
      </div>

      <div class="row">
        <button id="decodeFromImageBtn">استخراج النص / الملف من الصورة</button>
      </div>

      <label class="label">النص المسترجع (إذا كان صغيرًا):</label>
      <textarea id="outputText" readonly></textarea>

      <div class="row">
        <button id="downloadRecoveredTxtBtn">حفظ كنص TXT</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
