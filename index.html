<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ALM GeoFreq v6 — File → Image → File</title>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/docx@7.7.0/build/index.js"></script>

<style>
/* نفس الواجهة بدون تغيير */
body { font-family: "Cairo", Arial; background:#f6f8fb; }
header { background:#0BA37F; color:#fff; padding:15px; text-align:center; }
.container { max-width:900px; margin:auto; padding:20px; }
button{padding:10px;margin-top:10px;background:#0BA37F;color:#fff;border:none;}
#canvas{width:100%;max-width:520px;margin-top:10px;border:1px solid #ccc;}
</style>
</head>

<body>
<header>ALM GeoFreq v7 — Professional Image Mode</header>

<div class="container">
<input type="file" id="docInput">
<input type="text" id="userKey" value="123456789">
<button id="btnEncode">تحويل إلى صورة</button>
<canvas id="canvas"></canvas>
<button id="btnDecode">فك التشفير</button>
<pre id="outputText"></pre>
</div>

<script>
// ================= SETTINGS =================
const SIZE = 1024;
const HEADER = 16;
const LMAX = 12;
const B = 32;

// ================= CHAR TABLE =================
const chars="ابتثجحخدذرزسشصضطظعغفقكلمنهوي";
const charToIndex={}, indexToChar={};
[...chars].forEach((c,i)=>{charToIndex[c]=i+1; indexToChar[i+1]=c});

// ================= CLEAN =================
function cleanText(t){
  return t.replace(/[^\u0621-\u064A ]/g," ").replace(/\s+/g," ").trim();
}

// ================= WORD ENCODE =================
function wordToCode(w){
  let C=0n;
  for(let i=0;i<w.length;i++){
    C += BigInt(charToIndex[w[i]]||0) * (32n**BigInt(i));
  }
  return C;
}

function codeToWord(C){
  let w="";
  for(let i=0;i<LMAX;i++){
    let d=Number(C%32n);
    C/=32n;
    if(d) w+=indexToChar[d];
  }
  return w;
}

// ================= PROFESSIONAL DRAW =================
function drawImage(buf){

  // 🎨 Gradient Background
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      let i=(y*SIZE+x)*4;

      let g = 220 + Math.sin(x*0.01)*20;

      buf[i]=g;
      buf[i+1]=g+5;
      buf[i+2]=255;
      buf[i+3]=255;
    }
  }
}

// ================= BYTE DRAW =================
function drawByte(buf,p,v){
  const base=200;
  const variation=v%40;
  const gray=base-variation;

  let i=p*4;
  buf[i]=gray;
  buf[i+1]=gray;
  buf[i+2]=gray;
  buf[i+3]=255;
}

function readByte(data,p){
  let gray=data[p*4];
  return 200-gray;
}

// ================= OFFSET =================
function getPixelIndex(i){
  const OFFSET_X=100;
  const OFFSET_Y=100;

  const x=i%(SIZE-OFFSET_X);
  const y=Math.floor(i/(SIZE-OFFSET_X));

  return (y+OFFSET_Y)*SIZE+(x+OFFSET_X);
}

// ================= ENCODE =================
btnEncode.onclick=async()=>{

  const file=docInput.files[0];
  if(!file) return alert("اختر ملف");

  let text=await file.text();
  text=cleanText(text);

  const key=BigInt(userKey.value||0);
  const words=text.split(" ");

  const canvas=document.getElementById("canvas");
  canvas.width=SIZE;
  canvas.height=SIZE;

  const ctx=canvas.getContext("2d");
  const img=ctx.createImageData(SIZE,SIZE);
  const buf=img.data;

  drawImage(buf);

  let blocks=[];
  words.forEach(w=>{
    for(let i=0;i<w.length;i+=LMAX){
      blocks.push(w.slice(i,i+LMAX));
    }
  });

  // count
  let count=BigInt(blocks.length);
  for(let i=0;i<8;i++){
    drawByte(buf,i,Number((count>>BigInt(8*i))&255n));
  }

  // data
  blocks.forEach((b,bi)=>{
    let C=wordToCode(b)^key;
    for(let j=0;j<8;j++){
      let v=Number((C>>BigInt(8*j))&255n);
      let p=getPixelIndex(HEADER+bi*8+j);
      drawByte(buf,p,v);
    }
  });

  ctx.putImageData(img,0,0);

  // watermark
  ctx.font="bold 40px Cairo";
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillText("ALM Secure",50,80);
};

// ================= DECODE =================
btnDecode.onclick=async()=>{

  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");
  const data=ctx.getImageData(0,0,SIZE,SIZE).data;

  const key=BigInt(userKey.value||0);

  let count=0n;
  for(let i=0;i<8;i++){
    count |= BigInt(readByte(data,i))<<(8n*BigInt(i));
  }

  let blocks=[];
  for(let bi=0;bi<Number(count);bi++){
    let C=0n;
    for(let j=0;j<8;j++){
      let p=getPixelIndex(HEADER+bi*8+j);
      let v=readByte(data,p);
      C |= BigInt(v)<<(8n*BigInt(j));
    }
    blocks.push(codeToWord(C^key));
  }

  outputText.textContent=blocks.join(" ");
};

</script>
</body>
</html>
