<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Xx16‑ALM Metadata Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h2 class="title">Xx16‑ALM — File → Image → File</h2>

  <!-- ENCODE -->
  <section class="box">
    <h3>ترميز</h3>

    <label>مفتاح المستخدم (نصي):</label>
    <input type="text" id="userKey" placeholder="مثال: USER-KEY-123">

    <label>اختيار ملف Word أو PDF أو نص:</label>
    <input type="file" id="docInput">

    <button id="btnEncode">تحويل إلى صورة</button>
    <button id="btnSaveImage" class="save">💾 حفظ الصورة</button>

    <p id="statusEncode" class="status">جاهز.</p>

    <canvas id="canvas"></canvas>
  </section>

  <!-- DECODE -->
  <section class="box">
    <h3>استعادة</h3>

    <label>اختيار صورة PNG:</label>
    <input type="file" id="imageInput" accept="image/png">

    <button id="btnDecode">استعادة</button>

    <h4>البيانات المستخرجة:</h4>
    <div id="metaBox" class="metaBox"></div>

    <label>الناتج كنص:</label>
    <textarea id="outputText" readonly></textarea>

    <label>تنزيل الملف:</label>
    <select id="exportMode">
      <option value="bin">ملف ثنائي (BIN)</option>
      <option value="txt">نص (TXT)</option>
    </select>

    <button id="btnExport">تنزيل</button>

    <p id="statusDecode" class="status"></p>
  </section>

  <footer>
    © 2026 — <strong>Developer: Eng. رأفت عمر</strong>
  </footer>

  <script src="script.js"></script>
</body>
</html>
