<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Xx16 ALM Encoder</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Xx16 – ALM File Encoder</h1>

  <!-- ===================== 1) ENCODE ===================== -->
  <section>
    <h2>1) ترميز ملف → صورة</h2>

    <label>اختر ملفاً (TXT / Word / PDF):</label>
    <input type="file" id="docInput">

    <label>مفتاح المستخدم (اختياري):</label>
    <input type="text" id="userKey" placeholder="User Key">

    <button id="btnEncode">ترميز إلى صورة</button>

    <p id="statusEncode"></p>
  </section>

  <hr>

  <!-- ===================== 2) DECODE ===================== -->
  <section>
    <h2>2) فك صورة → نص/ملف</h2>

    <label>اختر صورة الترميز (PNG):</label>
    <input type="file" id="imageInput" accept="image/png">

    <button id="btnDecode">فك الترميز</button>

    <p id="statusDecode"></p>

    <h3>الناتج:</h3>
    <pre id="outputText"></pre>
  </section>

  <hr>

  <!-- ===================== 3) EXPORT ===================== -->
  <section>
    <h2>3) تصدير الملف المسترجع</h2>

    <label>صيغة التصدير:</label>
    <select id="exportMode">
      <option value="bin">ملف ثنائي (BIN)</option>
      <option value="txt">نص (TXT)</option>
    </select>

    <button id="btnExport">تصدير</button>
  </section>

  <hr>

  <!-- ===================== CANVAS ===================== -->
  <section>
    <h2>صورة الترميز (Canvas)</h2>
    <canvas id="canvas"></canvas>
  </section>

  <!-- Register Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(console.error);
    }
  </script>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
